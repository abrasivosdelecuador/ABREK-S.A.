<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos - ABREK S.A.</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins', sans-serif; background:#f4f6f9; min-height: 100vh; }

header { background:#1E2A78; display:flex; justify-content:space-between; align-items:center; padding:15px 60px; }
header img { height:60px; }

nav { display: flex; gap: 15px; align-items: center; }
nav a { color: #1E2A78; background: white; padding: 10px 20px; text-decoration: none; font-weight: 600; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
nav a:hover { background: #E30613; color: white; transform: translateY(-3px); }

.container { padding:50px 20px; max-width: 1200px; margin: 0 auto; }

h2 { font-family: 'Anton', sans-serif; color: #1E2A78; text-transform: uppercase; font-size: 45px; text-align: center; margin-bottom: 30px; }

.search-box { max-width: 500px; margin: 0 auto 30px auto; }
input#buscador { width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid #1E2A78; }

.categorias-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 50px; }
.btn-categoria { background: white; color: #1E2A78; border: 2px solid #1E2A78; padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: 600; }
.btn-categoria.activo { background: #E30613; color: white; }

.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:30px; }

.producto { 
background:white; padding:30px; border-radius:15px; text-align:center;
box-shadow: 0 5px 15px rgba(0,0,0,0.05);
transition: 0.3s;
display:flex; flex-direction:column; justify-content:space-between;
}

.producto:hover { transform: translateY(-10px); border-bottom: 4px solid #E30613; }

.producto img { width:100%; height:180px; object-fit:contain; margin-bottom:15px; background:#eee; border-radius:10px; }

.precio { font-weight:700; font-size:22px; color:#E30613; }

.contador { display:flex; justify-content:center; gap:8px; margin-bottom:15px; }
.contador button { width:35px; height:35px; }
.contador input { width:60px; text-align:center; }

.agregar { width:100%; background:#1E2A78; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; }

/* 🛒 BOTÓN CARRITO */
.carrito-btn {
position:fixed;
bottom:30px;
right:30px;
background:#E30613;
color:white;
width:65px;
height:65px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
z-index:1000;
transition:0.3s;
}

/* 🔥 ANIMACIÓN */
.carrito-btn.animar {
animation: rebote 0.4s;
}

@keyframes rebote {
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.burbuja {
position:absolute;
top:0;
right:0;
background:#1E2A78;
color:white;
border-radius:50%;
width:22px;
height:22px;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
}

.carrito-panel { position:fixed; right:-400px; top:0; width:350px; height:100vh; background:white; transition:0.4s; display:flex; flex-direction:column; }
.carrito-panel.activo { right:0; }

#lista { padding:20px; flex-grow:1; overflow:auto; }

.enviar-btn { background:#25D366; color:white; padding:15px; border:none; width:100%; border-radius:8px; }

/* 🔔 NOTIFICACIÓN */
.toast {
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#1E2A78;
color:white;
padding:12px 25px;
border-radius:25px;
opacity:0;
transition:0.4s;
z-index:2000;
}

.toast.show {
opacity:1;
bottom:40px;
}
/* ================= RESPONSIVE FINAL ================= */

/* Tablets */
@media (max-width: 1024px){
    header{
        padding: 15px 30px;
    }

    h2{
        font-size: 35px;
    }
}

/* Celulares */
@media (max-width: 768px){

    header{
        flex-direction: column;
        padding: 15px 20px;
        gap: 10px;
    }

    header img{
        height: 50px;
    }

    nav{
        flex-wrap: wrap;
        justify-content: center;
    }

    nav a{
        padding: 8px 12px;
        font-size: 12px;
    }

    h2{
        font-size: 28px;
    }

    .container{
        padding: 30px 15px;
    }

    .grid{
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .producto{
        padding: 15px;
    }

    .producto img{
        height: 130px;
    }

    .producto h3{
        font-size: 14px;
    }

    .precio{
        font-size: 16px;
    }

    .contador input{
        width: 45px;
    }

    .carrito-panel{
        width: 100%;
    }

    .carrito-btn{
        width: 55px;
        height: 55px;
        font-size: 22px;
        bottom: 20px;
        right: 20px;
    }
}

/* Pantallas pequeñas */
@media (max-width: 480px){

    .grid{
        grid-template-columns: 1fr;
    }

    h2{
        font-size: 22px;
    }

    nav a{
        font-size: 11px;
        padding: 6px 10px;
    }

    .producto h3{
        font-size: 13px;
    }

    .precio{
        font-size: 15px;
    }
}
</style>
</head>

<body>

<header>
<img src="logo.jpg">
<nav>
<a href="index.html">Inicio</a>
<a href="productos.html">Productos</a>
<a href="contacto.html">Contacto</a>
</nav>
</header>

<section class="container">
<h2>Catálogo Industrial</h2>

<div class="search-box">
<input type="text" id="buscador" placeholder="Buscar..." onkeyup="buscar()">
</div>

<div class="grid" id="grid-productos"></div>
</section>

<div class="carrito-btn" id="btnCarrito" onclick="toggleCarrito()">
🛒 <div class="burbuja" id="contadorCarrito">0</div>
</div>

<div class="carrito-panel" id="panel">
<div style="padding:20px;">
<span onclick="toggleCarrito()">✖</span>
<h2>Mi Pedido</h2>
</div>
<div id="lista"></div>
<button class="enviar-btn" onclick="enviar()">Finalizar</button>
</div>

<div class="toast" id="toast">Producto agregado</div>

<script src="datos.js"></script>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function mostrarToast(){
const t = document.getElementById("toast");
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),1500);
}

function animarCarrito(){
const btn = document.getElementById("btnCarrito");
btn.classList.add("animar");
setTimeout(()=>btn.classList.remove("animar"),400);
}

function agregarAlCarrito(id){
const p = productosData.find(x=>x.id==id);
let item = carrito.find(x=>x.id==id);

if(item) item.cantidad++;
else carrito.push({...p, cantidad:1});

guardarYActualizar();

/* 🔥 NUEVO */
mostrarToast();
animarCarrito();
}

function guardarYActualizar(){
localStorage.setItem("carrito", JSON.stringify(carrito));
actualizarCarritoUI();
}

function actualizarCarritoUI(){
let c=0;
carrito.forEach(p=>c+=p.cantidad);
document.getElementById("contadorCarrito").innerText=c;
}

function toggleCarrito(){
document.getElementById("panel").classList.toggle("activo");
}

function enviar(){
let m="Hola, quisiera hacer un pedido:%0A";
carrito.forEach(p=>{
m+=`• ${p.cantidad} del ${p.nombre}%0A`;
});
window.open("https://wa.me/593999617128?text="+m);
}

function renderizar(){
const grid=document.getElementById("grid-productos");
productosData.forEach(p=>{
grid.innerHTML+=`
<div class="producto">
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p class="precio">$${p.precio}</p>
<button class="agregar" onclick="agregarAlCarrito(${p.id})">Agregar</button>
</div>`;
});
}

renderizar();
actualizarCarritoUI();
</script>

</body>
</html>
